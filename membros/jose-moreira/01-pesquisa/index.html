<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="description" content="Mapa de mercado das PME industriais do concelho de Viana do Castelo — target list rankeada para José Moreira, consultor de Automação com IA." />
<meta name="robots" content="noindex,nofollow" />
<title>Mapa de Mercado — PME Industriais de Viana | José Moreira</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #04040A;
    --white: #F0F4FF;
    --cyan: #00F5FF;
    --gold: #FFB800;
    --purple: #9D00FF;
    --magenta: #FF006E;
    --lime: #39FF14;
    --grey: #8892A4;
    --grey2: #4A5568;
    --surface: rgba(255,255,255,0.025);
    --surface-elev: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.14);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 50% at 20% 0%, rgba(0,245,255,0.06), transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(157,0,255,0.05), transparent 60%);
    background-attachment: fixed;
  }

  /* NAV */
  .nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(4,4,10,0.85);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem;
  }
  .nav-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .nav-left {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.35rem 0.7rem;
    border-radius: 20px;
    background: rgba(0,245,255,0.08);
    border: 1px solid rgba(0,245,255,0.22);
    color: var(--cyan);
  }
  .badge.gold {
    background: rgba(255,184,0,0.08);
    border-color: rgba(255,184,0,0.22);
    color: var(--gold);
  }
  .nav-title {
    font-weight: 700;
    font-size: 0.92rem;
    color: var(--white);
  }
  .nav-title .sub {
    color: var(--grey);
    font-weight: 400;
    font-size: 0.82rem;
    margin-left: 0.5rem;
  }
  .nav-right {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }
  .nav-link {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--grey);
    text-decoration: none;
    padding: 0.4rem 0.8rem;
    border-radius: 6px;
    transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
    border: 1px solid transparent;
  }
  .nav-link:hover {
    color: var(--cyan);
    background: rgba(0,245,255,0.06);
    border-color: rgba(0,245,255,0.18);
  }

  /* HEADER */
  .hero {
    max-width: 1100px;
    margin: 0 auto;
    padding: 4rem 1.5rem 2.5rem;
  }
  .hero-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  /* MAIN CONTAINER */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 1.5rem 5rem;
  }

  /* CONTENT STYLING (output do marked.js) */
  #content h1 {
    font-size: 2.4rem;
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1.15;
    margin: 0 0 1.5rem;
    color: var(--white);
    background: linear-gradient(135deg, var(--white) 0%, var(--cyan) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  #content h2 {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.015em;
    line-height: 1.3;
    margin: 3.5rem 0 1.2rem;
    padding-top: 1.2rem;
    color: var(--white);
    border-top: 1px solid var(--border);
    position: relative;
  }
  #content h2::before {
    content: '';
    position: absolute;
    top: -1px;
    left: 0;
    width: 3rem;
    height: 2px;
    background: linear-gradient(90deg, var(--cyan), transparent);
  }
  #content h3 {
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: -0.005em;
    margin: 2.2rem 0 0.9rem;
    color: var(--white);
  }
  #content h3::before {
    content: '◆ ';
    color: var(--cyan);
    font-size: 0.7em;
    vertical-align: middle;
    margin-right: 0.25rem;
    opacity: 0.7;
  }
  #content h4 {
    font-size: 1rem;
    font-weight: 700;
    margin: 1.6rem 0 0.7rem;
    color: var(--gold);
  }
  #content p {
    font-size: 0.95rem;
    line-height: 1.8;
    margin: 0 0 1.1rem;
    color: var(--white);
    opacity: 0.92;
  }
  #content strong {
    color: var(--white);
    font-weight: 700;
  }
  #content em {
    color: var(--cyan);
    font-style: italic;
    opacity: 0.92;
  }
  #content a {
    color: var(--cyan);
    text-decoration: none;
    border-bottom: 1px dashed rgba(0,245,255,0.35);
    transition: all 0.2s;
    font-weight: 500;
    word-break: break-word;
  }
  #content a:hover {
    background: rgba(0,245,255,0.08);
    border-bottom-color: var(--cyan);
    border-bottom-style: solid;
  }
  #content ul,
  #content ol {
    margin: 0 0 1.2rem 1.3rem;
    font-size: 0.95rem;
    line-height: 1.8;
  }
  #content li {
    margin: 0.35rem 0;
    color: var(--white);
    opacity: 0.92;
  }
  #content li::marker {
    color: var(--cyan);
    font-weight: 700;
  }
  #content ol li::marker {
    font-family: 'JetBrains Mono', monospace;
    color: var(--gold);
  }
  #content hr {
    border: none;
    height: 1px;
    background: linear-gradient(90deg,
      transparent 0%,
      var(--border-strong) 20%,
      var(--cyan) 50%,
      var(--border-strong) 80%,
      transparent 100%);
    margin: 3rem 0;
    opacity: 0.5;
  }

  #content code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85em;
    font-weight: 500;
    padding: 0.15rem 0.4rem;
    background: rgba(0,245,255,0.07);
    border: 1px solid rgba(0,245,255,0.15);
    border-radius: 4px;
    color: var(--cyan);
  }
  #content pre {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.2rem;
    overflow-x: auto;
    margin: 1.2rem 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
  }
  #content pre code {
    background: transparent;
    border: none;
    padding: 0;
    color: var(--white);
  }

  #content blockquote {
    border-left: 3px solid var(--cyan);
    background: var(--surface);
    padding: 1rem 1.3rem;
    margin: 1.4rem 0;
    border-radius: 0 10px 10px 0;
    color: var(--grey);
    font-style: italic;
  }
  #content blockquote p {
    margin: 0;
  }

  /* TABLES — centro do design */
  #content table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    margin: 1.5rem 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    font-size: 0.88rem;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .table-wrap {
    overflow-x: auto;
    margin: 1.5rem 0;
    border-radius: 12px;
    border: 1px solid var(--border);
  }
  .table-wrap table {
    margin: 0;
    border: none;
    border-radius: 0;
  }
  #content th {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-align: left;
    padding: 0.95rem 1rem;
    background: rgba(0,245,255,0.05);
    color: var(--cyan);
    border-bottom: 1px solid rgba(0,245,255,0.15);
    white-space: nowrap;
  }
  #content td {
    padding: 0.85rem 1rem;
    border-bottom: 1px solid var(--border);
    color: var(--white);
    opacity: 0.92;
    font-size: 0.9rem;
    line-height: 1.55;
    vertical-align: top;
  }
  #content tr:last-child td {
    border-bottom: none;
  }
  #content tr:hover td {
    background: rgba(0,245,255,0.025);
  }
  #content td strong {
    color: var(--gold);
  }

  /* LOADING */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 50vh;
    gap: 1rem;
    color: var(--grey);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .loading-dot {
    width: 8px;
    height: 8px;
    background: var(--cyan);
    border-radius: 50%;
    box-shadow: 0 0 16px var(--cyan);
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 0.3; transform: scale(0.9); }
    50% { opacity: 1; transform: scale(1.1); }
  }

  .error {
    padding: 2rem;
    background: rgba(255,0,110,0.08);
    border: 1px solid rgba(255,0,110,0.25);
    border-radius: 12px;
    color: var(--magenta);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
  }

  /* FOOTER */
  .footer {
    max-width: 1100px;
    margin: 0 auto;
    padding: 3rem 1.5rem 2rem;
    border-top: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 1.5rem;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--grey);
    letter-spacing: 0.05em;
  }
  .footer-brand {
    color: var(--white);
    font-weight: 700;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb {
    background: var(--border-strong);
    border-radius: 5px;
  }
  ::-webkit-scrollbar-thumb:hover { background: rgba(0,245,255,0.25); }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .nav { padding: 0.75rem 1rem; }
    .nav-title { font-size: 0.82rem; }
    .nav-title .sub { display: none; }
    .hero { padding: 2.5rem 1rem 2rem; }
    main { padding: 0 1rem 3rem; }
    .footer { padding: 2rem 1rem 1.5rem; flex-direction: column; align-items: flex-start; }

    #content h1 { font-size: 1.8rem; }
    #content h2 { font-size: 1.3rem; margin-top: 2.5rem; }
    #content h3 { font-size: 1rem; }
    #content p, #content li { font-size: 0.92rem; }
    #content table { font-size: 0.8rem; }
    #content th, #content td { padding: 0.65rem 0.7rem; }
  }

  /* PRINT */
  @media print {
    body { background: white; color: black; }
    .nav, .footer { display: none; }
    #content a { color: black; border-bottom-color: black; }
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-left">
      <span class="badge">RESEARCH</span>
      <div class="nav-title">
        Mapa de Mercado — PME Viana<span class="sub">José Moreira · Atlas</span>
      </div>
    </div>
    <div class="nav-right">
      <a class="nav-link" href="#content">↓ Conteúdo</a>
      <a class="nav-link" href="mapa-mercado-pme-industrial-viana.md" download>.md</a>
    </div>
  </div>
</nav>

<header class="hero">
  <div class="hero-meta">
    <span class="badge gold">v1.0 · 20/04/2026</span>
    <span class="badge">AUTOR ATLAS</span>
    <span class="badge">80–130 PMEs</span>
  </div>
</header>

<main>
  <div id="content">
    <div class="loading">
      <div class="loading-dot"></div>
      <span>A carregar pesquisa…</span>
    </div>
  </div>
</main>

<footer class="footer">
  <div>
    <span class="footer-brand">[IA]AVANÇADA PT</span>
    <span> · pesquisa interna · confidencial</span>
  </div>
  <div>Destinatário: José Moreira · Autor: Atlas (Analyst AIOX)</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script>
  (async function () {
    const target = document.getElementById('content');
    try {
      const res = await fetch('mapa-mercado-pme-industrial-viana.md', { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const md = await res.text();

      marked.setOptions({
        gfm: true,
        breaks: false,
        headerIds: true,
        mangle: false,
      });

      const html = marked.parse(md);
      target.innerHTML = html;

      // Envolver tabelas para scroll horizontal em mobile
      document.querySelectorAll('#content table').forEach(function (t) {
        if (!t.parentElement.classList.contains('table-wrap')) {
          const wrap = document.createElement('div');
          wrap.className = 'table-wrap';
          t.parentNode.insertBefore(wrap, t);
          wrap.appendChild(t);
        }
      });

      // Anchor IDs para navegação de secções
      document.querySelectorAll('#content h2, #content h3').forEach(function (h) {
        if (!h.id) {
          h.id = h.textContent
            .toLowerCase()
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .replace(/[^a-z0-9]+/g, '-')
            .replace(/^-+|-+$/g, '');
        }
      });
    } catch (err) {
      target.innerHTML = '<div class="error">Erro ao carregar a pesquisa: ' + err.message + '</div>';
    }
  })();
</script>

</body>
</html>
